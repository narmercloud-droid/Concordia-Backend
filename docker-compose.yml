version: '3.9'

services:
  backend:
    build: .
    container_name: concordia-backend
    restart: always
    env_file:
      - .env
    ports:
      - "4000:4000"

  nginx:
    image: nginx:latest
    container_name: concordia-nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    container_name: concordia-certbot
    volumes:
      - ./certbot:/etc/letsencrypt
version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=your-access-secret-key
      - JWT_REFRESH_SECRET=your-refresh-secret-key
      - CORS_ORIGIN=http://localhost:3000
      - SOCKET_ORIGIN=http://localhost:3000
      - LOG_LEVEL=info
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - concordia-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - concordia-network

volumes:
  postgres_data:
  redis_data:

networks:
  concordia-network:
    driver: bridge