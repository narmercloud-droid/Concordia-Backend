apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: concordia-backend-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "concordia-backend"
    nginx.ingress.kubernetes.io/websocket-path: "/socket.io"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.concordia.com
    secretName: concordia-backend-tls
  rules:
  - host: api.concordia.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: concordia-backend
            port:
              number: 3000