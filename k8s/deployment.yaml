apiVersion: apps/v1
kind: Deployment
metadata:
  name: concordia-backend
  labels:
    app: concordia-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: concordia-backend
  template:
    metadata:
      labels:
        app: concordia-backend
    spec:
      containers:
      - name: concordia-backend
        image: concordia/backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: concordia-backend-config
        - secretRef:
            name: concordia-backend-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}