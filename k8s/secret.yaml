apiVersion: v1
kind: Secret
metadata:
  name: concordia-backend-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://concordia:password@postgres:5432/concordia"
  REDIS_URL: "redis://redis:6379"
  JWT_ACCESS_SECRET: "your-production-access-secret-key"
  JWT_REFRESH_SECRET: "your-production-refresh-secret-key"
  SENTRY_DSN: "your-sentry-dsn-here"