components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    WebhookSignature:
      type: apiKey
      in: header
      name: X-Signature
      description: HMAC-SHA256 signature of the request body (and timestamp) using your webhook secret.
  parameters:
    WebhookSignature:
      name: X-Signature
      in: header
      required: true
      schema:
        type: string
      description: HMAC-SHA256 signature header computed by the sender.
    WebhookTimestamp:
      name: X-Timestamp
      in: header
      required: true
      schema:
        type: string
      description: Timestamp provided by the sender (ISO8601 or epoch seconds). Use to mitigate replay attacks.
  responses:
    BadRequest:
      description: Bad request
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too many requests
      headers:
        Retry-After:
          description: Seconds or HTTP-date when the client can retry
          schema:
            type: string
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  headers:
    X-RateLimit-Limit:
      description: The rate limit ceiling for the current request
      schema:
        type: integer
        format: int32
    X-RateLimit-Remaining:
      description: The number of requests left for the time window
      schema:
        type: integer
        format: int32
    X-RateLimit-Reset:
      description: The time at which the current rate limit window resets (unix epoch seconds)
      schema:
        type: integer
        format: int64
  schemas:
    AdminLoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      additionalProperties: true
    AuthResponse:
      type: object
      properties:
        token:
          type: string
      additionalProperties: true
    GenericRequest:
      type: object
      description: Placeholder request schema - replace with concrete schema.
      additionalProperties: true
    GenericResponse:
      type: object
      description: Placeholder response schema - replace with concrete schema.
      properties:
        user:
          type: object
      additionalProperties: true
    TokenResponse:
      type: object
      properties:
        token:
          type: string
        customer:
          type: object
      additionalProperties: true
    CustomerLoginRequest:
      type: object
