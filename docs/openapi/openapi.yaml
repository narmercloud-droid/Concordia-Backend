openapi: 3.1.0
info:
  title: Concordia Backend API
  version: 1.0.0
  description: |
    OpenAPI skeleton for the Concordia Backend. This file is a lightweight
    scaffold generated from the human-maintained docs in /docs/api (01-06).
  contact:
    name: Concordia API Team
    email: devops@concordia.example
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.concordia.app
    description: Production (placeholder)
  - url: https://staging-api.concordia.app
    description: Staging (placeholder)
tags:
  - name: Auth
    description: Authentication endpoints (magic links, login, logout)
  - name: Orders
    description: Order creation and lifecycle endpoints
  - name: Admin
    description: Admin management endpoints (vouchers, opening hours, courier assign)
  - name: Menu
    description: Menu and variants CRUD
  - name: Offers
    description: Offer validation endpoints
  - name: Metrics
    description: Prometheus metrics endpoint
  - name: Webhooks
    description: Incoming webhook events and delivery contract
  - name: Public
    description: Public-facing endpoints (customer-facing)
security:
  - BearerAuth: []
paths:
  /api/auth/login:
    post:
      summary: Admin login
      operationId: adminLogin
      description: Authenticate admin by email/password. Route currently uses ad-hoc JSON response (res.tson/res.json).
      tags:
        - Auth
      requestBody:
        description: Login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Successful auth (token + user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
      security: []
  /api/auth/request-link:
    post:
      summary: Request magic login link (customer)
      operationId: requestMagicLink
      description: Send a magic link to a customer email. Route uses ad-hoc validation and response.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestMagicLinkRequest'
      responses:
        '200':
          description: Magic link queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                additionalProperties: true
              example:
                message: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/auth/verify:
    get:
      summary: Verify magic token (customer)
      operationId: verifyMagicToken
      description: Verify magic token and return customer payload and token.
      tags:
        - Auth
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verified token and returned customer + token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                token: string
                customer: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
      security: []
  /api/auth/admin/verify:
    get:
      summary: Verify admin magic token
      operationId: verifyAdminMagicToken
      description: Verify admin magic token and return admin payload.
      tags:
        - Auth
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Admin payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
      security: []
  /api/auth/logout:
    post:
      summary: Logout
      operationId: authLogout
      description: Clears session cookie and returns 204 No Content.
      tags:
        - Auth
      responses:
        '204':
          description: No content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
        - BearerAuth: []
  /api/admin/auth/login:
    post:
      summary: Admin login
      operationId: adminAuthLogin
      tags:
        - Admin
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin auth response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/auth/logout:
    post:
      summary: Admin logout
      operationId: adminAuthLogout
      tags:
        - Admin
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                user: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/orders:
    get:
      summary: List all orders (admin)
      operationId: adminListOrders
      tags:
        - Admin
        - Orders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Array of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
              example:
                - id: ord_20260604_0001
                  createdAt: '2026-06-04T12:34:56Z'
                  status: pending
                  branchId: branch_abc
                  customerId: cust_001
                  items:
                    - itemId: itm_123
                      variantId: var_456
                      quantity: 2
                      price: 9.5
                  externalAmount: 19
                  paymentStatus: pending
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/orders/{orderId}:
    get:
      summary: Get order by id (admin)
      operationId: adminGetOrder
      tags:
        - Admin
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                id: ord_20260604_0001
                createdAt: '2026-06-04T12:34:56Z'
                status: pending
                branchId: branch_abc
                customerId: cust_001
                items:
                  - itemId: itm_123
                    variantId: var_456
                    quantity: 2
                    price: 9.5
                externalAmount: 19
                paymentStatus: pending
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/orders/{orderId}/status:
    patch:
      summary: Patch order status (admin)
      operationId: adminPatchOrderStatus
      tags:
        - Admin
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
              additionalProperties: true
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                id: ord_20260604_0001
                createdAt: '2026-06-04T12:34:56Z'
                status: pending
                branchId: branch_abc
                customerId: cust_001
                items:
                  - itemId: itm_123
                    variantId: var_456
                    quantity: 2
                    price: 9.5
                externalAmount: 19
                paymentStatus: pending
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/menu:
    get:
      summary: Get menu (admin)
      operationId: adminGetMenu
      tags:
        - Admin
        - Menu
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItem'
              example:
                - id: 123
                  name: Margherita Pizza
                  description: Classic margherita with tomato, mozzarella and basil
                  basePrice: 10.5
                  imageUrl: https://cdn.example.com/images/margherita.jpg
                  isAvailable: true
                  variantGroups:
                    - id: vg_1
                      name: Size
                      required: true
                      minSelect: 1
                      maxSelect: 1
                      variants:
                        - id: var_small
                          name: Small
                          price: 0
                        - id: var_large
                          name: Large
                          price: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create menu item (admin)
      operationId: adminCreateMenu
      tags:
        - Admin
        - Menu
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItem'
      responses:
        '200':
          description: Created item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'
              example:
                id: 123
                name: Margherita Pizza
                description: Classic margherita with tomato, mozzarella and basil
                basePrice: 10.5
                imageUrl: https://cdn.example.com/images/margherita.jpg
                isAvailable: true
                variantGroups:
                  - id: vg_1
                    name: Size
                    required: true
                    minSelect: 1
                    maxSelect: 1
                    variants:
                      - id: var_small
                        name: Small
                        price: 0
                      - id: var_large
                        name: Large
                        price: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/menu/{itemId}:
    patch:
      summary: Update menu item (admin)
      operationId: adminPatchMenuItem
      tags:
        - Admin
        - Menu
      security:
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItem'
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'
              example:
                id: 123
                name: Margherita Pizza
                description: Classic margherita with tomato, mozzarella and basil
                basePrice: 10.5
                imageUrl: https://cdn.example.com/images/margherita.jpg
                isAvailable: true
                variantGroups:
                  - id: vg_1
                    name: Size
                    required: true
                    minSelect: 1
                    maxSelect: 1
                    variants:
                      - id: var_small
                        name: Small
                        price: 0
                      - id: var_large
                        name: Large
                        price: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete menu item (admin)
      operationId: adminDeleteMenuItem
      tags:
        - Admin
        - Menu
      security:
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                user: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/branches:
    get:
      summary: List branches (admin)
      operationId: adminListBranches
      tags:
        - Admin
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Branch list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
              example:
                - id: string
                  label: string
                  street: string
                  city: string
                  postalCode: string
                  lat: 1
                  lng: 1
                  instructions: string
                  isDefault: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create branch (admin)
      operationId: adminCreateBranch
      tags:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Created branch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
              example:
                id: string
                label: string
                street: string
                city: string
                postalCode: string
                lat: 1
                lng: 1
                instructions: string
                isDefault: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/branches/{branchId}:
    patch:
      summary: Update branch (admin)
      operationId: adminPatchBranch
      tags:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: branchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Updated branch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
              example:
                id: string
                label: string
                street: string
                city: string
                postalCode: string
                lat: 1
                lng: 1
                instructions: string
                isDefault: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/metrics/overview:
    get:
      summary: Metrics overview (admin)
      operationId: adminMetricsOverview
      tags:
        - Admin
        - Metrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Overview metrics
          content:
            application/json:
              schema:
                type: object
              example: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/metrics/orders:
    get:
      summary: Orders metrics (admin)
      operationId: adminMetricsOrders
      tags:
        - Admin
        - Metrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Orders metrics
          content:
            application/json:
              schema:
                type: object
              example: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/admin/metrics/customers:
    get:
      summary: Customers metrics (admin)
      operationId: adminMetricsCustomers
      tags:
        - Admin
        - Metrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Customers metrics
          content:
            application/json:
              schema:
                type: object
              example: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /webhooks/order.created:
    post:
      summary: Webhook - order.created
      operationId: webhookOrderCreated
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: >
        Receives `order.created` events from external systems.


        Signature verification: providers MUST send `X-Signature` (HMAC-SHA256 of the raw body using your webhook
        secret) and `X-Timestamp` (ISO8601 or unix epoch seconds). Verify signature by computing HMAC-SHA256(secret,
        timestamp + '.' + body) and comparing in constant time.


        Retry policy: webhooks may be retried with exponential backoff. Implement idempotency by deduping on `event.id`.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreatedEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /webhooks/order.updated:
    post:
      summary: Webhook - order.updated
      operationId: webhookOrderUpdated
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: |
        Receives `order.updated` events. See signature verification and idempotency notes above.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdatedEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /webhooks/order.status_changed:
    post:
      summary: Webhook - order.status_changed
      operationId: webhookOrderStatusChanged
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: |
        Receives `order.status_changed` events. Payload contains previous and new status.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusChangedEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /webhooks/payment.succeeded:
    post:
      summary: Webhook - payment.succeeded
      operationId: webhookPaymentSucceeded
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: |
        Receives `payment.succeeded` events for successful payment captures.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentSucceededEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /webhooks/payment.failed:
    post:
      summary: Webhook - payment.failed
      operationId: webhookPaymentFailed
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: |
        Receives `payment.failed` events when a payment attempts fail.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentFailedEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /webhooks/courier.assigned:
    post:
      summary: Webhook - courier.assigned
      operationId: webhookCourierAssigned
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: |
        Receives `courier.assigned` events when a courier is assigned to an order.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourierAssignedEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /webhooks/courier.location_updated:
    post:
      summary: Webhook - courier.location_updated
      operationId: webhookCourierLocationUpdated
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: |
        Receives `courier.location_updated` events with courier GPS updates.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourierLocationUpdatedEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /webhooks/branch.opening_hours_changed:
    post:
      summary: Webhook - branch.opening_hours_changed
      operationId: webhookBranchOpeningHoursChanged
      tags:
        - Webhooks
      security:
        - WebhookSignature: []
      description: |
        Receives `branch.opening_hours_changed` events when branch hours change.
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
        - $ref: '#/components/parameters/WebhookTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchOpeningHoursChangedEvent'
      responses:
        '200':
          description: Received and processed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                status: ok
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/orders:
    post:
      summary: Create order
      operationId: createOrder
