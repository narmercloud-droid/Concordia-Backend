services:
  - type: web
    name: concordia-backend-web
    env: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production

  # Keeps the free-tier web service warm and the Neon connection alive between visits.
  - type: cron
    name: concordia-backend-warmup
    runtime: node
    plan: free
    schedule: "*/14 * * * *"
    buildCommand: echo "warmup cron"
    startCommand: >-
      node --input-type=module -e
      "const u='https://concordia-backend-web.onrender.com/health';
      const r=await fetch(u); console.log(r.status); process.exit(r.ok?0:1)"
