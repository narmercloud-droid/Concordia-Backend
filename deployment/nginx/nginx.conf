user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend {
        server backend:3000;
    }

    upstream gateway {
        server gateway:4000;
    }

    upstream terminal_ui {
        server terminal_ui:80;
    }

    upstream admin_ui {
        server admin_ui:80;
    }

    upstream courier_ui {
        server courier_ui:80;
    }

    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws/ {
            proxy_pass http://gateway/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /terminal/ {
            proxy_pass http://terminal_ui/;
        }

        location /admin/ {
            proxy_pass http://admin_ui/;
        }

        location /courier/ {
            proxy_pass http://courier_ui/;
        }
    }
}
